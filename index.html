<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Head Tilt Rotator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --fg: #f0f0f0;
    --accent: #00ff88;
    --accent2: #ff3cac;
    --accent3: #00cfff;
    --panel: #161616;
    --border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* The whole page rotates */
  #page-content {
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: center center;
    min-height: 100vh;
    width: 100%;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Page Content ── */
  .page-inner {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    position: relative;
  }

  /* Background grid */
  .page-inner::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 800;
    line-height: 0.9;
    background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  .sub {
    margin-top: 1.25rem;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
  }

  /* Direction compass */
  .compass {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-areas:
      ". up ."
      "left mid right"
      ". down .";
    gap: 0.4rem;
    width: 180px;
  }

  .compass-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 52px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .compass-btn.up    { grid-area: up; }
  .compass-btn.left  { grid-area: left; }
  .compass-btn.mid   { grid-area: mid; border-color: var(--border); }
  .compass-btn.right { grid-area: right; }
  .compass-btn.down  { grid-area: down; }

  .compass-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0,255,136,0.4);
  }
  .compass-btn.mid.active {
    background: var(--accent3);
    border-color: var(--accent3);
    box-shadow: 0 0 20px rgba(0,207,255,0.4);
  }

  /* ── Camera overlay (fixed, doesn't rotate) ── */
  #camera-overlay {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.75rem;
  }

  #cam-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    width: 180px;
  }

  #cam-panel canvas {
    width: 180px !important;
    height: 180px !important;
    display: block;
    object-fit: cover;
  }

  #cam-status {
    padding: 0.5rem 0.75rem;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.error  { background: var(--accent2); }

  #start-btn {
    width: 180px;
    padding: 0.7rem;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  #start-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  #start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Confidence bar */
  #conf-bar-wrap {
    width: 180px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  #conf-label {
    margin-bottom: 0.3rem;
    display: flex;
    justify-content: space-between;
  }

  #conf-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  #conf-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }

  /* Decorative corner elements */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 0;
    opacity: 0.15;
  }
  .corner-tl { top: 1.5rem; left: 1.5rem; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .corner-tr { top: 1.5rem; right: 1.5rem; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
  .corner-bl { bottom: 1.5rem; left: 1.5rem; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }

  /* rotation angle badge */
  #angle-badge {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.9rem;
    transition: color 0.3s;
  }
  #angle-badge.lit { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>

<div id="angle-badge">0°</div>

<!-- This div rotates -->
<div id="page-content">
  <div class="page-inner">
    <div class="hero">
      <p class="eyebrow">Head Tilt Detector</p>
      <h1>TILT<br>YOUR<br>HEAD</h1>
      <p class="sub">pose model · live detection</p>
    </div>

    <div class="compass">
      <div class="compass-btn up"    id="dir-up">▲ UP</div>
      <div class="compass-btn left"  id="dir-left">◀ L</div>
      <div class="compass-btn mid"   id="dir-neutral">●</div>
      <div class="compass-btn right" id="dir-right">R ▶</div>
      <div class="compass-btn down"  id="dir-down">▼ DN</div>
    </div>
  </div>
</div>

<!-- Camera panel — fixed, doesn't rotate with page -->
<div id="camera-overlay">
  <div id="conf-bar-wrap">
    <div id="conf-label"><span id="conf-class">—</span><span id="conf-pct">0%</span></div>
    <div id="conf-track"><div id="conf-fill"></div></div>
  </div>
  <div id="cam-panel">
    <canvas id="canvas"></canvas>
    <div id="cam-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </div>
  <button id="start-btn" onclick="init()">▶ Start Camera</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
<script>
  const MODEL_URL = "https://teachablemachine.withgoogle.com/models/S3EejkoWs/";

  // Map class names → rotation degrees
  // Adjust these keys to match your exact Teachable Machine class names
  const DIRECTION_MAP = {
    'left':    -90,
    'right':    90,
    'up':      180,
    'down':   -180,
    'neutral':   0,
    'straight':  0,
    'center':    0,
  };

  // Compass button IDs per direction
  const DIR_BTNS = {
    'left': 'dir-left', 'right': 'dir-right',
    'up': 'dir-up', 'down': 'dir-down',
    'neutral': 'dir-neutral', 'straight': 'dir-neutral', 'center': 'dir-neutral',
  };

  let model, webcam, ctx, maxPredictions;
  let currentRotation = 0;
  const CONFIDENCE_THRESHOLD = 0.75;

  function setStatus(msg, state = '') {
    document.getElementById('status-text').textContent = msg;
    const dot = document.getElementById('status-dot');
    dot.className = 'status-dot' + (state ? ' ' + state : '');
  }

  function rotatePage(deg) {
    currentRotation = deg;
    document.getElementById('page-content').style.transform = `rotate(${deg}deg)`;
    const badge = document.getElementById('angle-badge');
    badge.textContent = deg + '°';
    badge.className = deg !== 0 ? 'lit' : '';
  }

  function highlightCompass(className) {
    document.querySelectorAll('.compass-btn').forEach(b => b.classList.remove('active'));
    const key = className.toLowerCase().trim();
    const btnId = DIR_BTNS[key];
    if (btnId) document.getElementById(btnId).classList.add('active');
  }

  async function init() {
    const btn = document.getElementById('start-btn');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    setStatus('Loading model…');

    try {
      model = await tmPose.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      maxPredictions = model.getTotalClasses();

      const size = 180;
      webcam = new tmPose.Webcam(size, size, true);
      await webcam.setup();
      await webcam.play();

      const canvas = document.getElementById("canvas");
      canvas.width = size;
      canvas.height = size;
      ctx = canvas.getContext("2d");

      btn.style.display = 'none';
      setStatus('Detecting…', 'active');
      window.requestAnimationFrame(loop);
    } catch(e) {
      setStatus('Error: ' + e.message, 'error');
      btn.disabled = false;
      btn.textContent = '↺ Retry';
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);

    // Draw webcam + skeleton
    ctx.drawImage(webcam.canvas, 0, 0);
    if (pose) {
      tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
      tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);
    }

    const prediction = await model.predict(posenetOutput);

    // Find highest confidence class
    const best = prediction.reduce((a, b) => a.probability > b.probability ? a : b);

    // Update confidence bar
    document.getElementById('conf-class').textContent = best.className;
    document.getElementById('conf-pct').textContent = (best.probability * 100).toFixed(0) + '%';
    document.getElementById('conf-fill').style.width = (best.probability * 100) + '%';

    // Only act if confident enough
    if (best.probability >= CONFIDENCE_THRESHOLD) {
      const key = best.className.toLowerCase().trim();
      const deg = DIRECTION_MAP[key];
      if (deg !== undefined && deg !== currentRotation) {
        rotatePage(deg);
        highlightCompass(best.className);
      } else if (deg !== undefined) {
        highlightCompass(best.className);
      }
    }
  }
</script>
</body>
</html>
